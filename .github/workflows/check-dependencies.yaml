name: Check 3rd party dependencies

on:
  pull_request:
    paths:
    - "Cargo.*"
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: ${{ vars.RUST_TOOLCHAIN || 'stable' }}
  RUSTFLAGS: -Dwarnings
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  deps:
    name: "Check 3rd party licenses"
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required by the run-eclipse-dash action for uploading results of the license check
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Determine 3rd party dependencies
      working-directory: ${{github.workspace}}
      run: |
        cargo tree --all-features --locked -e no-build,no-dev --prefix none --no-dedupe \
          | sed -n '2~1p' \
          | sort -u \
          | grep -v '^[[:space:]]*$' \
          | sed -E 's|([^ ]+) v([^ ]+).*|crate/cratesio/-/\1/\2|' \
          > DEPS.txt
    - name: Run Eclipse Dash Licenses tool
      uses: eclipse-uprotocol/ci-cd/.github/actions/run-eclipse-dash@fcaf488b5d152c290a3a8dca2463a5c1dec65acd
      with:
        components-file: DEPS.txt
